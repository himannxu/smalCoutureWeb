# Nginx SPA (React Router) fallback — fixes 404 on refresh for paths like /AllProducts /products/foo
#
# Deploy: copy the relevant parts into your real server/site config on Google Cloud VM,
# or include this snippet and set `root` to your built app directory (CRA: .../build).
#
# Reload after edit: sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: Yarn / React build sirf nginx ko change NAHI karti — ye config server par
# (/etc/nginx/sites-enabled/...) manually lagani zaroori hai. Agar nginx access nahin:
# frontend mein HashRouter use ho raha hai; URLs mein `#` dikhegi, refresh OK.

server {
    listen 80;
    listen [::]:80;
    # server_name smalcouture.com www.smalcouture.com;
    server_name _;

    # CRA production build folder (adjust to your deployment path):
    root /var/www/smalcouture/build;
    index index.html;

    # Cache static assets; optional — tune expiry as you like.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    # Single Page Application: unknown paths serve index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # If you proxy /api to Node, uncomment and fix upstream:
    # location /api/ {
    #     proxy_pass http://127.0.0.1:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
